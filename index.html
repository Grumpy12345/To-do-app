<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>To-do App</title>
        <link href="style.css" rel="stylesheet">
        <script src="script.js" defer></script>
    </head>

    <body>
        <div class="app-container">
            <h1>To-dos</h1>

            <div class="todos">
                <!-- tasks go here -->
            </div>

            <div class="completed">
                <h2>Completed</h2>
                <!-- completed tasks go here -->
            </div>

            <div class="new-task">
                <button id="add-task">+</button>
            </div>
        </div>
    </body>
</html>
